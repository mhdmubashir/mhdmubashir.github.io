    <style>
      /* Critical CSS for fast above-the-fold render */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #0a192f;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
      }
      #loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #0a192f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loader-logo {
        font-size: 28px;
        font-weight: 700;
        color: #ccd6f6;
        letter-spacing: -0.5px;
        margin-bottom: 24px;
      }
      .loader-logo span {
        color: #64ffda;
      }
      .loader-bar {
        width: 160px;
        height: 2px;
        background: #1e3a5f;
        border-radius: 2px;
        overflow: hidden;
      }
      .loader-fill {
        height: 100%;
        background: #64ffda;
        border-radius: 2px;
        animation: load 1.2s ease-in-out forwards;
      }
      @keyframes load {
        from {
          width: 0%;
        }
        to {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <!-- Loading screen -->
    <div id="loading">
      <div class="loader-logo"><span>M</span>ubashir</div>
      <div class="loader-bar"><div class="loader-fill"></div></div>
    </div>

    <!-- Flutter app target -->
    <script>
      window.addEventListener("flutter-first-frame", function () {
        const loader = document.getElementById("loading");
        if (loader) {
          loader.classList.add("hidden");
          setTimeout(() => loader.remove(), 500);
        }
      });
    </script>

    <!-- SPA path restore: decodes the path encoded by 404.html and -->
    <!-- restores it via history.replaceState before Flutter initializes. -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>

    <script src="flutter_bootstrap.js" async></script>
  </body>
